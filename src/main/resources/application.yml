spring:
  application:
    name: funds

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/funds}
      auto-index-creation: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.funds: INFO
    org.springframework.data.mongodb: WARN